<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 16px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      padding: 28px 28px 24px;
      color: #fff;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -.3px;
    }

    .header .meta {
      margin-top: 6px;
      font-size: .85rem;
      opacity: .8;
    }

    .input-row {
      display: flex;
      gap: 10px;
      padding: 20px 20px 12px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }

    .input-row input:focus { border-color: #6366f1; }

    .input-row input::placeholder { color: #9ca3af; }

    .input-row button {
      padding: 12px 20px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #4f46e5; }
    .input-row button:active { transform: scale(.97); }

    .filter-row {
      display: flex;
      gap: 6px;
      padding: 0 20px 16px;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 20px;
      background: transparent;
      font-size: .8rem;
      font-weight: 500;
      color: #6b7280;
      cursor: pointer;
      transition: all .2s;
    }

    .filter-btn.active {
      background: #ede9fe;
      border-color: #6366f1;
      color: #6366f1;
    }

    .list {
      list-style: none;
      padding: 0 20px;
      max-height: 420px;
      overflow-y: auto;
    }

    .list::-webkit-scrollbar { width: 4px; }
    .list::-webkit-scrollbar-track { background: transparent; }
    .list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 4px;
      border-bottom: 1px solid #f3f4f6;
      animation: fadeIn .2s ease;
    }

    .item:last-child { border-bottom: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #6366f1;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item .name {
      flex: 1;
      font-size: .95rem;
      color: #111827;
      transition: all .2s;
      word-break: break-all;
    }

    .item.done .name {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .item .del {
      background: none;
      border: none;
      color: #d1d5db;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color .2s, background .2s;
      flex-shrink: 0;
    }

    .item .del:hover { color: #ef4444; background: #fef2f2; }

    .empty {
      text-align: center;
      padding: 40px 0;
      color: #9ca3af;
      font-size: .9rem;
    }

    .empty .icon { font-size: 2.5rem; margin-bottom: 10px; }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px 20px;
      border-top: 1px solid #f3f4f6;
      margin-top: 4px;
    }

    .footer .count { font-size: .82rem; color: #6b7280; }

    .footer .clear-btn {
      background: none;
      border: none;
      font-size: .82rem;
      color: #ef4444;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background .2s;
    }

    .footer .clear-btn:hover { background: #fef2f2; }
    .footer .clear-btn:disabled { opacity: .35; cursor: default; }
    .footer .clear-btn:disabled:hover { background: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="meta" id="meta">항목이 없습니다</div>
  </div>

  <div class="input-row">
    <input id="input" type="text" placeholder="구매할 항목 입력..." maxlength="60" />
    <button onclick="addItem()">추가</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
    <button class="filter-btn" onclick="setFilter('todo', this)">미완료</button>
    <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
  </div>

  <ul class="list" id="list"></ul>

  <div class="footer">
    <span class="count" id="count"></span>
    <button class="clear-btn" id="clearBtn" onclick="clearDone()">완료 항목 삭제</button>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://zblodruvqklgewwvxcwc.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpibG9kcnV2cWtsZ2V3d3Z4Y3djIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNjc1MzYsImV4cCI6MjA5NTg0MzUzNn0.jQ4SSHcXdRKnZM6VfPLyoA2F6t0YXj_SbanU8x_5T5I';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  let items = [];
  let filter = 'all';

  const input    = document.getElementById('input');
  const listEl   = document.getElementById('list');
  const metaEl   = document.getElementById('meta');
  const countEl  = document.getElementById('count');
  const clearBtn = document.getElementById('clearBtn');

  async function loadItems() {
    const { data, error } = await supabase
      .from('shopping_items')
      .select('*')
      .order('created_at', { ascending: false });
    if (!error) {
      items = data;
      render();
    }
  }

  function render() {
    const visible = items.filter(it =>
      filter === 'all'  ? true :
      filter === 'todo' ? !it.done :
                           it.done
    );

    listEl.innerHTML = visible.length === 0
      ? `<li class="empty"><div class="icon">${filter === 'done' ? '✅' : '📝'}</div>${
          filter === 'done' ? '완료된 항목이 없어요' :
          filter === 'todo' ? '미완료 항목이 없어요' : '항목을 추가해 보세요'
        }</li>`
      : visible.map(it => `
          <li class="item${it.done ? ' done' : ''}">
            <input type="checkbox" ${it.done ? 'checked' : ''}
              onchange="window._toggle('${it.id}')" />
            <span class="name">${escHtml(it.name)}</span>
            <button class="del" onclick="window._remove('${it.id}')" title="삭제">✕</button>
          </li>`).join('');

    const total = items.length;
    const done  = items.filter(i => i.done).length;

    metaEl.textContent = total === 0
      ? '항목이 없습니다'
      : `${done}/${total}개 완료`;

    countEl.textContent = `총 ${total}개`;
    clearBtn.disabled = done === 0;
  }

  async function addItem() {
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    const { data, error } = await supabase
      .from('shopping_items')
      .insert({ name, done: false })
      .select()
      .single();
    if (!error) {
      items.unshift(data);
      input.value = '';
      render();
    }
    input.focus();
  }

  async function toggle(id) {
    const item = items.find(it => it.id === id);
    if (!item) return;
    const { error } = await supabase
      .from('shopping_items')
      .update({ done: !item.done })
      .eq('id', id);
    if (!error) {
      items = items.map(it => it.id === id ? { ...it, done: !it.done } : it);
      render();
    }
  }

  async function remove(id) {
    const { error } = await supabase
      .from('shopping_items')
      .delete()
      .eq('id', id);
    if (!error) {
      items = items.filter(it => it.id !== id);
      render();
    }
  }

  async function clearDone() {
    const doneIds = items.filter(i => i.done).map(i => i.id);
    if (doneIds.length === 0) return;
    const { error } = await supabase
      .from('shopping_items')
      .delete()
      .in('id', doneIds);
    if (!error) {
      items = items.filter(i => !i.done);
      render();
    }
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // module scope 함수를 전역에 노출
  window._toggle = toggle;
  window._remove = remove;
  window.addItem = addItem;
  window.clearDone = clearDone;
  window.setFilter = setFilter;

  input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

  loadItems();
</script>
</body>
</html>
